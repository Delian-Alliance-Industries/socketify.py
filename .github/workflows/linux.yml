name: Linux Build
on: workflow_dispatch
permissions:
  contents: write
jobs:
 build-linux-amd64:
    runs-on: ubuntu-latest
    container: debian:bookworm
    name: Build on linux-amd64
    steps:
      - name: Update binaries
        run: |
          apt-get update
          apt-get install -y build-essential cmake git libuv1-dev zlib1g-dev golang perl
          git clone --recursive https://github.com/${{ github.repository }}.git
          cd socketify.py/src/socketify/native
          make linux
          cd ../
          git add libsocketify_linux_amd64.so
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git config --global user.name "${{ github.actor }}"
          git config --global --add safe.directory "$(pwd)"
          git commit -m "[GitHub Actions] Updated linux-amd64 binaries" || true
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

 build-linux-arm64:
    needs: build-linux-amd64
    runs-on: ubuntu-24.04-arm
    container: debian:bookworm
    name: Build on linux-arm64
    steps:
      - name: Update binaries
        run: |
          apt-get update
          apt-get install -y build-essential cmake git libuv1-dev zlib1g-dev golang perl
          git clone --recursive https://github.com/${{ github.repository }}.git
          cd socketify.py/src/socketify/native
          make linux PLATFORM=arm64
          cd ../
          git add libsocketify_linux_arm64.so
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git config --global user.name "${{ github.actor }}"
          git config --global --add safe.directory "$(pwd)"
          git commit -m "[GitHub Actions] Updated linux-arm64 binaries" || true
          git pull --rebase "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" main
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
